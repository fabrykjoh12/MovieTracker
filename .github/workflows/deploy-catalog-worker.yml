name: Deploy catalog Worker

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalog-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: catalog-worker
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TMDB_READ_ACCESS_TOKEN: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Verify deployment configuration
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$TMDB_READ_ACCESS_TOKEN" ] || [ -z "$DATABASE_URL" ]; then
            echo "::error::Add all four required secrets to the catalog-worker environment."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker
        run: npm run worker:check

      - name: Prepare encrypted Worker secrets
        run: |
          umask 077
          printf 'TMDB_READ_ACCESS_TOKEN=%s\nDATABASE_URL=%s\n' "$TMDB_READ_ACCESS_TOKEN" "$DATABASE_URL" > worker/.dev.vars.production

      - name: Deploy Worker
        run: npx wrangler deploy --config worker/wrangler.jsonc --secrets-file worker/.dev.vars.production
